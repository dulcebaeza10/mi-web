<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Web en GitHub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2ea44f; }
        p { line-height: 1.6; }
        .badge {
            background-color: #2ea44f;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola Mundo! 🚀</h1>
        <p>Esta es la página web de <strong>Dul</strong>.</p>
        <p>Logré subirla a GitHub Pages y ahora es pública para todo el planeta.</p>
        <a href="#" class="badge">Estudiante de Sistemas</a>
    </div>

</body>
</html>
